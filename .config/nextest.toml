# Nextest configuration for Onyxia
#
# GPU tests must run serially: each test prepares its own device sessions,
# and parallel model loading exhausts GPU memory.

[test-groups]
gpu-tests = { max-threads = 1 }

[profile.default]
# Every GPU differential suite lives in a test binary named `gpu_test`
# (onyxia-backend-wgpu, onyxia-backend-cubecl). They are `#[ignore]`d, so
# they only run under `--run-ignored=all` (`just test-all`).
[[profile.default.overrides]]
filter = 'binary(gpu_test)'
test-group = 'gpu-tests'
